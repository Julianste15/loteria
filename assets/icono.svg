<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradiente de fondo moderno -->
    <linearGradient id="ballGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <!-- Sombra suave para la bola de bingo -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Bola de bingo principal con degradado -->
  <circle cx="50" cy="50" r="45" fill="url(#ballGradient)" filter="url(#shadow)" />

  <!-- Detalle de brillo en la parte superior para dar efecto 3D sutil -->
  <ellipse cx="50" cy="22" rx="25" ry="10" fill="#ffffff" fill-opacity="0.15" />

  <!-- Círculo interior blanco tradicional de bola de lotería -->
  <circle cx="50" cy="50" r="24" fill="#ffffff" />

  <!-- Texto 90 en el centro -->
  <text x="50" y="58" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-weight="900" 
        font-size="26" 
        fill="#1e293b" 
        text-anchor="middle">90</text>
</svg>
